services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: moneytransfer-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_PID: "Express"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -C -b -Q 'SELECT 1' -o /dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 20s

  api:
    build: ./backend
    container_name: moneytransfer-api
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ConnectionStrings__Default: "Server=db,1433;Database=MoneyTransfer;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080" # exposed for Swagger UI: http://localhost:8080/swagger

  web:
    build: ./frontend
    container_name: moneytransfer-web
    depends_on:
      - api
    ports:
      - "3000:80" # the app: http://localhost:3000

volumes:
  mssql-data:
